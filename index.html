<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicTacToe+ v1.7</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f1a; color: #f0f0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 16px;
  }
  h1 { font-size: 1.7rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; color: #fff; }
  .subtitle { font-size: 0.8rem; letter-spacing: 0.1em; color: #888; margin-bottom: 12px; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
  .toggle-btn {
    background: #1a1a2e; border: 1px solid #2a2a4a; color: #aaa;
    padding: 6px 14px; border-radius: 50px; font-size: 0.78rem;
    letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .toggle-btn.active { background: #7c6aff22; border-color: #7c6aff; color: #fff; }
  .toggle-btn.diff-btn.active { background: #ff6a6a11; border-color: #ff6a6a; color: #ff6a6a; }
  .scoreboard { display: flex; gap: 10px; margin-bottom: 12px; align-items: stretch; }
  .score-card {
    background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px;
    padding: 8px 14px; text-align: center; min-width: 64px;
    display: flex; flex-direction: column; justify-content: center;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .score-card.active { border-color: #7c6aff; box-shadow: 0 0 12px #7c6aff44; }
  .score-card .player-label { font-size: 0.6rem; letter-spacing: 0.1em; color: #888; margin-bottom: 3px; }
  .score-card .symbol { font-size: 1.1rem; font-weight: bold; line-height: 1; }
  .score-card.x .symbol { color: #7c6aff; }
  .score-card.o .symbol { color: #ff6a6a; }
  .score-card.draw .symbol { color: #666; }
  .score-card .points { font-size: 1.4rem; font-weight: 700; margin-top: 3px; line-height: 1; }
  .status {
    font-size: 0.92rem; letter-spacing: 0.04em;
    margin-bottom: 12px; height: 22px; color: #ccc; text-align: center;
  }
  .status .hx { color: #7c6aff; font-weight: bold; }
  .status .ho { color: #ff6a6a; font-weight: bold; }
  .game-area { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .reserve { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 52px; }
  .reserve-row { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .reserve-label { font-size: 0.58rem; color: #666; letter-spacing: 0.05em; }
  .reserve-pieces { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .piece-token {
    border-radius: 50%; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    border: 2px solid transparent; flex-shrink: 0;
  }
  .piece-token.x-piece { background: #2a1e5a; border-color: #7c6aff88; }
  .piece-token.o-piece { background: #3a1a1a; border-color: #ff6a6a88; }
  .piece-token.small  { width: 16px; height: 16px; }
  .piece-token.medium { width: 26px; height: 26px; }
  .piece-token.large  { width: 36px; height: 36px; }
  .piece-token.used   { opacity: 0.15; cursor: default; pointer-events: none; }
  .piece-token.selected { box-shadow: 0 0 0 3px #ffffffcc; transform: scale(1.18); }
  .piece-token:not(.used):not(.selected):hover { transform: scale(1.1); }
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cell {
    width: 88px; height: 88px; background: #1a1a2e;
    border: 2px solid #2a2a4a; border-radius: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .cell:hover { background: #22224a; border-color: #7c6aff44; }
  .cell.highlight   { border-color: #7c6aff99; box-shadow: 0 0 10px #7c6aff44; }
  .cell.highlight-o { border-color: #ff6a6a99; box-shadow: 0 0 10px #ff6a6a44; }
  .board-piece { border-radius: 50%; pointer-events: none; }
  .board-piece.x-piece { background: #3a2a7a; border: 2.5px solid #7c6aff; }
  .board-piece.o-piece { background: #4a1e1e; border: 2.5px solid #ff6a6a; }
  .board-piece.small  { width: 22px; height: 22px; }
  .board-piece.medium { width: 40px; height: 40px; }
  .board-piece.large  { width: 62px; height: 62px; }
  .cell.win-x { border-color: #7c6affc0; box-shadow: 0 0 18px #7c6aff66; background: #1e1540; }
  .cell.win-o { border-color: #ff6a6ac0; box-shadow: 0 0 18px #ff6a6a66; background: #2a1212; }
  .btn {
    background: #7c6aff; color: #fff; border: none;
    padding: 11px 30px; border-radius: 50px; font-size: 0.9rem;
    letter-spacing: 0.07em; font-weight: 600; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: #9a8bff; transform: scale(1.03); }
  .btn:active { transform: scale(0.97); }
  /* Multiplayer overlay */
  .mp-overlay {
    display: none; position: fixed; inset: 0; background: #000000cc;
    z-index: 200; align-items: center; justify-content: center;
  }
  .mp-overlay.show { display: flex; }
  .mp-box {
    background: #13132a; border: 1px solid #2a2a4a; border-radius: 20px;
    padding: 32px 28px; max-width: 340px; width: 100%; text-align: center;
  }
  .mp-box h2 { color:#fff; font-size:1.1rem; letter-spacing:0.1em; margin-bottom:20px; }
  .mp-status { color:#aaa; font-size:0.88rem; margin-bottom:20px; min-height:40px; line-height:1.5; }
  .mp-status .accent { color:#7c6aff; font-weight:bold; }
  .spinner {
    width:36px; height:36px; border:3px solid #2a2a4a;
    border-top-color:#7c6aff; border-radius:50%;
    animation: spin 0.8s linear infinite; margin:0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .mp-cancel { margin-top:12px; background:none; border:1px solid #2a2a4a; color:#888;
    padding:8px 20px; border-radius:50px; font-size:0.8rem; cursor:pointer; }
  .mp-cancel:hover { border-color:#ff6a6a; color:#ff6a6a; }
  .lb-row {
    display:flex; align-items:center; justify-content:space-between;
    background:#1a1a2e; border:1px solid #2a2a4a; border-radius:10px;
    padding:8px 12px; font-size:0.85rem;
  }
  .lb-row.me { border-color:#7c6aff; background:#7c6aff15; }
  .lb-rank { color:#888; min-width:28px; font-weight:700; }
  .lb-name { flex:1; color:#fff; font-weight:600; margin-left:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .lb-elo { color:#7c6aff; font-weight:700; }
  @media (max-width: 400px) {
    .cell { width: 76px; height: 76px; }
    .board-piece.large { width: 54px; height: 54px; }
    .reserve { width: 44px; }
  }
</style>
</head>
<body>

<h1>TicTacToe+ <span style="font-size:0.55rem;color:#555;letter-spacing:0.05em;vertical-align:middle;">v1.7</span></h1>
<p class="subtitle" id="subtitle">2 Spieler · lokal</p>

<p id="activePlayersText" style="font-size:0.72rem;color:#666;letter-spacing:0.04em;margin-bottom:6px;min-height:16px;"></p>
<div class="row">
  <button class="toggle-btn active" id="btn-2p">👥 2 Spieler</button>

<div class="row" id="diff-row" style="display:none">

</div>

<div class="scoreboard">

  </div>
  <div class="score-card draw" id="card-draw">

  </div>

<div class="status" id="status"></div>

<div class="game-area">

    <div class="reserve-row" id="res-x-small"></div>
  </div>
  <div class="board" id="board">
    <div class="cell" data-i="0"></div><div class="cell" data-i="1"></div><div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div><div class="cell" data-i="4"></div><div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div><div class="cell" data-i="7"></div><div class="cell" data-i="8"></div>

    <div class="reserve-row" id="res-o-large"></div>

    <div class="reserve-row" id="res-o-small"></div>

</div>

<button class="btn" id="surrenderBtn" style="display:none;background:#ff6a6a;margin-bottom:10px;" data-t="surrender">Aufgeben</button>
<div class="row" id="rematchRow" style="display:none;justify-content:center;">
  <button class="btn" id="rematchBtn" data-t="rematch">Nochmal</button>
  <button class="btn" id="endMatchBtn" style="background:#1a1a2e;border:1px solid #2a2a4a;color:#aaa;" data-t="endGame">Beenden</button>
</div>
<button class="btn" id="resetBtn" data-t="newGame">Neues Spiel</button>
<button class="btn" id="rulesBtn" style="margin-top:10px;background:#1a1a2e;border:1px solid #2a2a4a;color:#aaa;font-size:0.82rem;padding:9px 24px;">📖 <span data-t="rulesBtn"></span></button>
<button class="btn" id="leaderboardBtn" style="margin-top:10px;background:#1a1a2e;border:1px solid #2a2a4a;color:#aaa;font-size:0.82rem;padding:9px 24px;">🏆 <span data-t="leaderboardBtn"></span></button>

<!-- Name entry overlay -->
<div class="mp-overlay" id="nameOverlay">
  <div class="mp-box">
    <h2 data-t="nameTitle">👤 Dein Spielername</h2>
    <p class="mp-status" data-t="nameDesc" style="margin-bottom:16px;"></p>
    <input id="nameInput" type="text" maxlength="16" placeholder="z.B. Max"
      style="width:100%;padding:12px;border-radius:12px;border:1px solid #2a2a4a;background:#0f0f1a;color:#fff;font-size:1rem;text-align:center;margin-bottom:16px;">
    <button class="btn" id="nameConfirmBtn" style="width:100%" data-t="nameConfirm"></button>
  </div>
</div>

<!-- Leaderboard overlay -->
<div class="mp-overlay" id="leaderboardOverlay">
  <div class="mp-box" style="max-width:380px;">
    <h2 data-t="leaderboardTitle">🏆 Weltrangliste</h2>
    <div id="leaderboardList" style="max-height:340px;overflow-y:auto;margin:16px 0;text-align:left;display:flex;flex-direction:column;gap:6px;"></div>
    <button class="mp-cancel" id="leaderboardCloseBtn" data-t="close" style="width:100%"></button>
  </div>
</div>

<!-- Multiplayer overlay -->
<div class="mp-overlay" id="mpOverlay">
  <div class="mp-box">
    <h2 id="mpTitle">🌐 Online Multiplayer</h2>
    <div class="row" id="mpMoveRow" style="justify-content:center;margin-bottom:14px;">
      <button class="toggle-btn" id="mp-btn-nomove">🔒 <span data-t="fixed"></span></button>
      <button class="toggle-btn active" id="mp-btn-move">🔄 <span data-t="movable"></span></button>
    </div>
    <div class="mp-status" id="mpStatus"></div>
    <button class="btn" id="mpSearchBtn" style="width:100%">🔍 Spiel suchen</button>
    <button class="mp-cancel" id="mpCancelBtn">Abbrechen</button>

</div>

<!-- Rules Modal -->
<div id="rulesModal" style="display:none;position:fixed;inset:0;background:#000000bb;z-index:100;overflow-y:auto;padding:20px;">
  <div style="background:#13132a;border:1px solid #2a2a4a;border-radius:20px;max-width:420px;margin:auto;padding:28px 24px;position:relative;">
    <button id="rulesClose" style="position:absolute;top:14px;right:16px;background:none;border:none;color:#888;font-size:1.4rem;cursor:pointer;">✕</button>
    <h2 style="color:#fff;font-size:1.2rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:18px;">📖 <span data-t="rulesTitle"></span></h2>
    <div style="color:#ccc;font-size:0.88rem;line-height:1.7;display:flex;flex-direction:column;gap:14px;">
      <div><div style="color:#7c6aff;font-weight:700;margin-bottom:4px;">🎯 <span data-t="r_goalTitle"></span></div><span data-t="r_goalText"></span></div>
      <div>
        <div style="color:#7c6aff;font-weight:700;margin-bottom:4px;">🔵 <span data-t="r_piecesTitle"></span></div>
        <span data-t="r_piecesIntro"></span>
        <ul style="margin-top:6px;margin-left:16px;display:flex;flex-direction:column;gap:3px;">
          <li><b style="color:#fff">3× <span data-t="small"></span> (S)</b> – <span data-t="r_small"></span></li>

          <li><b style="color:#fff">2× <span data-t="large"></span> (L)</b> – <span data-t="r_large"></span></li>
        </ul>
      </div>
      <div><div style="color:#7c6aff;font-weight:700;margin-bottom:4px;">♟️ <span data-t="r_moveTitle"></span></div><span data-t="r_moveText"></span></div>
      <div><div style="color:#7c6aff;font-weight:700;margin-bottom:4px;">📦 <span data-t="r_gobbleTitle"></span></div><span data-t="r_gobbleText"></span></div>
      <div><div style="color:#7c6aff;font-weight:700;margin-bottom:4px;">🔄 <span data-t="r_relocTitle"></span></div><span data-t="r_relocText"></span></div>
      <div><div style="color:#7c6aff;font-weight:700;margin-bottom:4px;">⏭️ <span data-t="r_skipTitle"></span></div><span data-t="r_skipText"></span></div>
      <div>
        <div style="color:#7c6aff;font-weight:700;margin-bottom:4px;">🤖 <span data-t="r_aiTitle"></span></div>
        <b style="color:#fff"><span data-t="easy"></span></b> – <span data-t="r_easy"></span><br>
        <b style="color:#fff"><span data-t="medium"></span></b> – <span data-t="r_medium_ai"></span><br>
        <b style="color:#fff"><span data-t="hard"></span></b> – <span data-t="r_hard"></span>
      </div>
      <div><div style="color:#7c6aff;font-weight:700;margin-bottom:4px;">🔁 <span data-t="r_startTitle"></span></div><span data-t="r_startText"></span></div>
    </div>
    <button id="rulesClose2" style="margin-top:22px;width:100%;background:#7c6aff;color:#fff;border:none;padding:12px;border-radius:50px;font-size:0.92rem;font-weight:600;cursor:pointer;letter-spacing:0.07em;" data-t="understood"></button>
  </div>
</div>

<!-- Firebase SDK (classic scripts, compatible with file:// protocol) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const WINS     = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const SIZES    = { small:1, medium:2, large:3 };
const SIZE_NAMES = ['small','medium','large'];

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playPlace(size) {
  try {
    const ctx = getAudio(), now = ctx.currentTime;
    const cfg = {
      small:  {freq:520,freq2:340,dur:0.09,vol:0.28,nv:0.06,lpf:900},
      medium: {freq:280,freq2:160,dur:0.16,vol:0.42,nv:0.14,lpf:400},
      large:  {freq:110,freq2: 60,dur:0.30,vol:0.65,nv:0.30,lpf:180},
    }[size];
    const o=ctx.createOscillator(),go=ctx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(cfg.freq,now);
    o.frequency.exponentialRampToValueAtTime(cfg.freq2,now+cfg.dur);
    go.gain.setValueAtTime(cfg.vol,now); go.gain.exponentialRampToValueAtTime(0.001,now+cfg.dur);
    o.connect(go); go.connect(ctx.destination); o.start(now); o.stop(now+cfg.dur);
    const buf=ctx.createBuffer(1,ctx.sampleRate*cfg.dur,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const n=ctx.createBufferSource(),f=ctx.createBiquadFilter(),gn=ctx.createGain();
    n.buffer=buf; f.type='lowpass'; f.frequency.value=cfg.lpf;
    gn.gain.setValueAtTime(cfg.nv,now); gn.gain.exponentialRampToValueAtTime(0.001,now+cfg.dur*0.8);
    n.connect(f); f.connect(gn); gn.connect(ctx.destination); n.start(now); n.stop(now+cfg.dur);
  } catch(e){}
}
function playWin() {
  try {
    const ctx=getAudio();
    [261,329,392,523,659].forEach((f,i)=>{
      const t=ctx.currentTime+i*0.10,o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.35,t+0.03);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.4);
    });
    [523,659,784].forEach(f=>{
      const t=ctx.currentTime+0.55,o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
      o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.8);
    });
  } catch(e){}
}
function playLose() {
  try {
    const ctx=getAudio();
    [392,330,262,196].forEach((f,i)=>{
      const t=ctx.currentTime+i*0.13,o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.28,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.45);
    });
  } catch(e){}
}
function playDraw() {
  try {
    const ctx=getAudio();
    [330,294].forEach((f,i)=>{
      const t=ctx.currentTime+i*0.18,o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
      o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.5);
    });
  } catch(e){}
}

// ── Game state ────────────────────────────────────────────────────────────────
let vsAI=false, vsOnline=false;
let difficulty='easy', allowMove=true;
let scores={X:0,O:0,D:0}, firstPlayer='X';
let board, reserve, current, gameOver, selected;

// Online state
let myPlayer=null;       // 'X' or 'O'
let roomId=null;
let searchingRef=null;
let roomRef=null;
let roomListener=null;
let disconnectRef=null;
let currentOpponentId=null;  // deviceId of current online opponent
let rematchCount=0;          // games played vs currentOpponentId this session
const MAX_REMATCHES=3;

// ── Init ──────────────────────────────────────────────────────────────────────
function initGame() {
  board = Array.from({length:9},()=>[]);
  reserve = { X:{small:3,medium:3,large:2}, O:{small:3,medium:3,large:2} };
  current = firstPlayer;
  gameOver = false; selected = null;
  renderAll();
  if (vsAI && current==='O') setTimeout(doAiMove,500);
}
function resetScores() { scores={X:0,O:0,D:0}; }

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() { renderBoard(); renderReserve(); renderScores(); renderStatus(); }

function renderBoard() {
  document.querySelectorAll('.cell').forEach((cell,i)=>{
    cell.innerHTML=''; cell.className='cell';
    const stack=board[i];
    if (stack.length) {
      const top=stack[stack.length-1];
      const p=document.createElement('div');
      p.className=`board-piece ${top.player==='X'?'x-piece':'o-piece'} ${top.size}`;
      cell.appendChild(p);
    }
    if (selected && !gameOver && canPlace(i))
      cell.classList.add(selected.player==='X'?'highlight':'highlight-o');
  });
}

function renderReserve() {
  ['X','O'].forEach(p=>{
    ['large','medium','small'].forEach(sz=>{
      const container=document.getElementById(`res-${p.toLowerCase()}-${sz}`);
      container.innerHTML='';
      const lbl=document.createElement('div'); lbl.className='reserve-label';
      lbl.textContent=`${sz==='small'?'S':sz==='medium'?'M':'L'} ×${reserve[p][sz]}`;
      container.appendChild(lbl);
      const pd=document.createElement('div'); pd.className='reserve-pieces';
      const total=sz==='large'?2:3;
      for(let k=0;k<total;k++){
        const tok=document.createElement('div');
        tok.className=`piece-token ${p==='X'?'x-piece':'o-piece'} ${sz}`;
        const avail=k<reserve[p][sz];
        if(!avail){ tok.classList.add('used'); }
        else {
          const isMyTurn = vsOnline ? (current===myPlayer && p===myPlayer) : (!vsAI || p!=='O');
          if(!gameOver && current===p && isMyTurn){
            tok.addEventListener('click',()=>selectReserve(p,sz));
            if(selected?.source==='reserve'&&selected.player===p&&selected.size===sz&&k===0)
              tok.classList.add('selected');
          }
        }
        pd.appendChild(tok);
      }
      container.appendChild(pd);
    });
  });
}

function renderScores() {
  document.getElementById('score-x').textContent=scores.X;
  document.getElementById('score-o').textContent=scores.O;
  document.getElementById('score-draw').textContent=scores.D;
  document.getElementById('card-x').classList.toggle('active',current==='X'&&!gameOver);
  document.getElementById('card-o').classList.toggle('active',current==='O'&&!gameOver);
}

function renderStatus() {
  const el=document.getElementById('status');
  if(gameOver) return;
  const isX=current==='X';
  let name;
  if(vsOnline) name=current===myPlayer?(myName||t('you')):(oppName||t('opponent'));
  else if(vsAI&&!isX) name=t('ai');
  else name=isX?t('player1'):t('player2');
  const cls=isX?'hx':'ho', sym=isX?'✕':'○';
  const hint=selected?t('chooseTarget'):t('isOnTurn');
  el.innerHTML=`<span class="${cls}">${sym} ${name}</span>${hint}`;
}

// ── Selection & placement ─────────────────────────────────────────────────────
function selectReserve(player, size) {
  if(gameOver||player!==current) return;
  if(vsOnline&&player!==myPlayer) return;
  if(reserve[player][size]<=0) return;
  if(selected?.source==='reserve'&&selected.player===player&&selected.size===size) selected=null;
  else selected={source:'reserve',player,size};
  renderAll();
}

function selectBoardPiece(idx) {
  if(gameOver||!allowMove) return;
  const stack=board[idx]; if(!stack.length) return;
  const top=stack[stack.length-1];
  if(top.player!==current) return;
  if(vsOnline&&top.player!==myPlayer) return;
  if(selected?.source==='board'&&selected.boardIdx===idx) selected=null;
  else selected={source:'board',player:top.player,size:top.size,boardIdx:idx};
  renderAll();
}

function canPlace(targetIdx) {
  if(!selected) return false;
  if(selected.source==='board'&&selected.boardIdx===targetIdx) return false;
  const stack=board[targetIdx];
  const mySize=SIZES[selected.size];
  if(!stack.length) return true;
  return mySize>SIZES[stack[stack.length-1].size];
}

function placeOnCell(targetIdx) {
  if(!selected||!canPlace(targetIdx)) return;
  const move={
    source:selected.source, size:selected.size, target:targetIdx,
    boardIdx:selected.source==='board'?selected.boardIdx:null,
    player:selected.player
  };
  if(vsOnline) { pushOnlineMove(move); return; }
  applyLocalMove(move);
}

function applyLocalMove(move) {
  const sz=move.size;
  if(move.source==='reserve') reserve[move.player][move.size]--;
  else board[move.boardIdx].pop();
  board[move.target].push({player:move.player,size:move.size});
  selected=null;
  playPlace(sz);
  checkEndOfTurn();
}

// ── End of turn ───────────────────────────────────────────────────────────────
function hasMoves(player) { return getAllMoves(player).length>0; }

function checkEndOfTurn() {
  const win=checkWinLine();
  if(win){
    gameOver=true; scores[current]++;
    const wc=current==='X'?'win-x':'win-o';
    win.forEach(idx=>document.querySelector(`[data-i="${idx}"]`).classList.add(wc));
    const color=current==='X'?'#7c6aff':'#ff6a6a';
    const sym=current==='X'?'✕':'○';
    let name;
    if(vsOnline) name=current===myPlayer?t('you'):t('opponent');
    else if(vsAI&&current==='O') name=t('ai');
    else name=current==='X'?t('player1'):t('player2');
    document.getElementById('status').innerHTML=
      `<span style="color:${color};font-weight:bold">${sym} ${name}</span>${t('wins')}`;
    if(vsOnline){ if(current===myPlayer) playWin(); else playLose(); }
    else if(vsAI){ current==='O'?playLose():playWin(); }
    else playWin();
    renderBoard(); renderScores();
    if(vsOnline) showGameEndUI();
    return;
  }
  const next=current==='X'?'O':'X';
  if(!hasMoves(next)){
    if(!hasMoves(current)){
      gameOver=true; scores.D++; playDraw();
      document.getElementById('status').textContent=t('drawMsg');
      renderScores();
      if(vsOnline) showGameEndUI();
      return;
    }
    const skipName=vsOnline?(next===myPlayer?t('you'):t('opponent'))
      :(vsAI&&next==='O'?t('ai'):(next==='X'?t('player1'):t('player2')));
    const skipSym=next==='X'?'✕':'○', skipCls=next==='X'?'hx':'ho';
    document.getElementById('status').innerHTML=
      `<span class="${skipCls}">${skipSym} ${skipName}</span>${t('skipMsg')}`;
    renderBoard(); renderScores();
    setTimeout(()=>{ if(gameOver) return; renderAll(); if(vsAI&&current==='O'&&!gameOver) setTimeout(doAiMove,400); },1500);
    return;
  }
  current=next;
  renderAll();
  if(vsAI&&current==='O'&&!gameOver) setTimeout(doAiMove,400);
}

function checkWinLine() {
  for(const [a,b,c] of WINS){
    const sa=board[a],sb=board[b],sc=board[c];
    if(!sa.length||!sb.length||!sc.length) continue;
    const pa=sa[sa.length-1].player,pb=sb[sb.length-1].player,pc=sc[sc.length-1].player;
    if(pa===pb&&pb===pc) return [a,b,c];
  }
  return null;
}
function checkWinFor(player){
  for(const [a,b,c] of WINS){
    const sa=board[a],sb=board[b],sc=board[c];
    if(!sa.length||!sb.length||!sc.length) continue;
    if(sa[sa.length-1].player===player&&sb[sb.length-1].player===player&&sc[sc.length-1].player===player) return true;
  }
  return false;
}

// ── AI ────────────────────────────────────────────────────────────────────────
function getAllMoves(player){
  const moves=[];
  for(const sz of SIZE_NAMES){
    if(reserve[player][sz]>0){
      for(let t=0;t<9;t++){
        const s=board[t];
        if(!s.length||SIZES[sz]>SIZES[s[s.length-1].size])
          moves.push({source:'reserve',size:sz,target:t,player});
      }
    }
  }
  if(allowMove){
    for(let src=0;src<9;src++){
      const stack=board[src]; if(!stack.length) continue;
      const top=stack[stack.length-1]; if(top.player!==player) continue;
      for(let t=0;t<9;t++){
        if(t===src) continue;
        const ts=board[t];
        if(!ts.length||SIZES[top.size]>SIZES[ts[ts.length-1].size])
          moves.push({source:'board',size:top.size,boardIdx:src,target:t,player});
      }
    }
  }
  return moves;
}
function applyMove(mv,player){
  if(mv.source==='reserve') reserve[player][mv.size]--;
  else board[mv.boardIdx].pop();
  board[mv.target].push({player,size:mv.size});
}
function undoMove(mv,player){
  board[mv.target].pop();
  if(mv.source==='reserve') reserve[player][mv.size]++;
  else board[mv.boardIdx].push({player,size:mv.size});
}
function findWinMove(player){
  for(const mv of getAllMoves(player)){
    applyMove(mv,player); const w=checkWinFor(player); undoMove(mv,player); if(w) return mv;
  }
  return null;
}
function findThreatBlock(){
  for(const [a,b,c] of WINS){
    const tops=[board[a],board[b],board[c]].map(s=>s.length?s[s.length-1]:null);
    const xCount=tops.filter(t=>t&&t.player==='X').length;
    if(xCount===2){
      for(let i=0;i<3;i++){
        const idx=[a,b,c][i],top=tops[i];
        for(const sz of ['large','medium','small']){
          if(reserve['O'][sz]>0&&(!top||SIZES[sz]>SIZES[top.size]))
            return{source:'reserve',size:sz,target:idx,player:'O'};
        }
      }
    }
  }
  return null;
}
function preferredMove(moves,chance){
  if(Math.random()>chance) return pickRandom(moves);
  const prio=[4,0,2,6,8,1,3,5,7];
  for(const cell of prio){ const m=moves.filter(mv=>mv.target===cell); if(m.length) return m[m.length-1]; }
  return pickRandom(moves);
}
function pickRandom(moves){ return moves[Math.floor(Math.random()*moves.length)]; }

function doAiMove(){
  if(gameOver||current!=='O') return;
  const moves=getAllMoves('O'); if(!moves.length){ current='X'; renderAll(); return; }
  let chosen;
  if(difficulty==='easy')
    chosen=findWinMove('O')||findThreatBlock()||preferredMove(moves,0.55);
  else if(difficulty==='medium')
    chosen=findWinMove('O')||findWinMove('X')||(Math.random()<0.3?pickRandom(moves):minimaxRoot(2,0.25));
  else
    chosen=findWinMove('O')||(Math.random()<0.05?pickRandom(moves):minimaxRoot(5,0));
  selected=null; applyMove(chosen,'O'); playPlace(chosen.size); checkEndOfTurn();
}
function minimaxRoot(depth,noise){
  const moves=getAllMoves('O'); let best=-Infinity,chosen=moves[0];
  for(const mv of moves){
    applyMove(mv,'O'); let val=minimax(depth-1,false,-Infinity,Infinity); undoMove(mv,'O');
    val+=(Math.random()*2-1)*noise*3;
    if(val>best){best=val;chosen=mv;}
  }
  return chosen;
}
function minimax(depth,isMax,alpha,beta){
  if(checkWinFor('O')) return 100; if(checkWinFor('X')) return -100;
  if(depth===0) return evalBoard();
  const player=isMax?'O':'X'; const moves=getAllMoves(player); if(!moves.length) return 0;
  let best=isMax?-Infinity:Infinity;
  for(const mv of moves){
    applyMove(mv,player); const val=minimax(depth-1,!isMax,alpha,beta); undoMove(mv,player);
    if(isMax){best=Math.max(best,val);alpha=Math.max(alpha,best);}
    else{best=Math.min(best,val);beta=Math.min(beta,best);}
    if(beta<=alpha) break;
  }
  return best;
}
function evalBoard(){
  let score=0;
  for(const [a,b,c] of WINS){
    const tops=[board[a],board[b],board[c]].map(s=>s.length?s[s.length-1]:null);
    const oC=tops.filter(t=>t&&t.player==='O').length;
    const xC=tops.filter(t=>t&&t.player==='X').length;
    const oSz=tops.filter(t=>t&&t.player==='O').reduce((s,t)=>s+SIZES[t.size],0);
    const xSz=tops.filter(t=>t&&t.player==='X').reduce((s,t)=>s+SIZES[t.size],0);
    if(xC===0){score+=oC*oC*2+oSz*0.5;}
    if(oC===0){score-=xC*xC*2+xSz*0.5;}
    if(xC===2&&oC===0) score-=8+xSz;
    if(oC===2&&xC===0) score+=8+oSz;
  }
  const cb=board[4]; if(cb.length&&cb[cb.length-1].player==='O') score+=1.5;
  [0,2,6,8].forEach(i=>{const s=board[i];if(s.length&&s[s.length-1].player==='O')score+=0.8;});
  score+=reserve['O'].large*0.4;
  return score;
}

function loadPlayerIdentity() {

// Since localStorage/sessionStorage are unavailable in some sandboxed contexts,
// we persist the player's chosen name + deviceId using document.cookie (works on file:// in browsers).
function getCookie(name) {
  const m = document.cookie.match(new RegExp('(?:^|; )'+name+'=([^;]*)'));
  return m ? decodeURIComponent(m[1]) : null;
}
function setCookie(name, value) {
  document.cookie = `${name}=${encodeURIComponent(value)};max-age=31536000;path=/`;
}

}

// ── Online Multiplayer ────────────────────────────────────────────────────────
const QUEUE_PATH = 'matchmaking/queue';
const ROOMS_PATH = 'rooms';
const PLAYERS_PATH = 'players';
let db = null;
let mmTimer = null;       // matchmaking 5s escalation timer
let mmStartTime = 0;

function initFirebase() {
  if (db) return true;
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp({
        databaseURL: 'https://tictactoe-plus-fd090-default-rtdb.europe-west1.firebasedatabase.app'
      });
    }
    db = firebase.database();
    return true;
  } catch(e) {
    console.warn('Firebase init failed:', e);
    return false;
  }
}

// ── Presence: track & display active players ─────────────────────────────────
const PRESENCE_PATH = 'presence';
let presenceStarted = false;

function startPresence() {
  if (presenceStarted || !db) return;
  presenceStarted = true;
  try {
    const myPresenceRef = db.ref(`${PRESENCE_PATH}/${deviceId}`);
    const connectedRef = db.ref('.info/connected');
    connectedRef.on('value', snap => {
      if (snap.val() === true) {
        myPresenceRef.onDisconnect().remove();
        myPresenceRef.set(true);
      }
    });
  } catch(e) { console.warn('Presence init failed:', e); }
}

function listenActivePlayers() {
  if (!db) return;
  try {
    db.ref(PRESENCE_PATH).on('value', snap => {
      const data = snap.val() || {};
      const count = Object.keys(data).length;
      const el = document.getElementById('activePlayersText');
      if (el) el.textContent = `🟢 ${count} ${count===1 ? t('playerActive') : t('playersActive')}`;
    });
  } catch(e) { console.warn('Active players listener failed:', e); }
}

async function fetchMyElo() {
  if (!db) return 1000;
  try {
    const snap = await db.ref(`${PLAYERS_PATH}/${deviceId}`).get();
    const data = snap.val();
    if (data && typeof data.elo === 'number') { myElo = data.elo; return myElo; }
  } catch(e) {}
  return myElo;
}

async function saveMyElo(newElo) {
  myElo = newElo;
  if (!db) return;
  try {
    await db.ref(`${PLAYERS_PATH}/${deviceId}`).set({ name: myName, elo: Math.round(newElo), updated: firebase.database.ServerValue.TIMESTAMP });
  } catch(e) {}
}

function eloDelta(myRating, oppRating, score) {
  // score: 1 = win, 0.5 = draw, 0 = loss
  const K = 32;
  const expected = 1 / (1 + Math.pow(10, (oppRating - myRating)/400));
  return Math.round(K * (score - expected));
}

function showMpOverlay(searching) {
  const overlay=document.getElementById('mpOverlay');
  const status=document.getElementById('mpStatus');
  const searchBtn=document.getElementById('mpSearchBtn');
  overlay.classList.add('show');
  if(searching){
    status.innerHTML=`<div class="spinner"></div>${t('mpSearching')}`;
    searchBtn.style.display='none';
  } else {
    status.innerHTML=`${t('mpWelcome')}<br><span style="color:#7c6aff;font-weight:700;margin-top:6px;display:inline-block;">${myName||'?'} · ELO ${Math.round(myElo)}</span>`;
    searchBtn.style.display='block';
    searchBtn.textContent=`🔍 ${t('mpSearch')}`;
  }
}
function hideMpOverlay(){ document.getElementById('mpOverlay').classList.remove('show'); if(mmTimer){clearTimeout(mmTimer);mmTimer=null;} }

async function startMatchmaking() {
  ensurePlayerName(async () => {
    if (!initFirebase()) {
      document.getElementById('mpStatus').innerHTML=
        '<span style="color:#ff6a6a">⚠️ Firebase nicht verfügbar.</span>';
      return;
    }
    await fetchMyElo();
    showMpOverlay(true);
    mmStartTime = Date.now();
    await tryMatch();
  });
}

async function tryMatch() {
  const myId = deviceId;
  try {
    // Use a transaction on the queue to atomically claim a waiting opponent
    // or register ourselves as the waiter. This prevents the race condition
    // where two players click "search" simultaneously and both become hosts.
    const queueRef = db.ref(QUEUE_PATH);
    let claimedOppId = null;
    let claimedOppData = null;
    const myRoomId = 'room_'+myId+'_'+Date.now();

    const txResult = await queueRef.transaction(current => {
      // Reset per-attempt state — Firebase may invoke this callback multiple
      // times on contention, so nothing here may leak between attempts except
      // via the return value itself.
      claimedOppId = null; claimedOppData = null;
      const entries = Object.entries(current || {}).filter(([id]) => id !== myId);
      if (entries.length > 0) {
        entries.sort((a,b) => Math.abs(a[1].elo-myElo) - Math.abs(b[1].elo-myElo));
        const [oppId, oppData] = entries[0];
        claimedOppId = oppId; claimedOppData = oppData;
        const updated = { ...(current || {}) };
        delete updated[oppId];
        return updated;
      }
      const updated = { ...(current || {}) };
      updated[myId] = { name: myName, elo: myElo, deviceId: myId,
        roomId: myRoomId, allowMove: allowMove, ts: Date.now() };
      return updated;
    });

    if (!txResult.committed) {
      document.getElementById('mpStatus').innerHTML=`<span style="color:#ff6a6a">⚠️ ${t('mpRetry')}</span>`;
      return;
    }

    // Read the FINAL committed queue state to determine our actual role,
    // since the transaction callback may have run multiple times.
    const finalQueue = txResult.snapshot.val() || {};
    const iAmStillInQueue = !!finalQueue[myId];

    if (!iAmStillInQueue && claimedOppId && claimedOppData) {
      // We successfully claimed an opponent -> we are the guest (O)
      myPlayer='O'; roomId=claimedOppData.roomId;
      currentOpponentId = claimedOppData.deviceId || claimedOppId;
      rematchCount = 1;
      if (claimedOppData.allowMove !== undefined && claimedOppData.allowMove !== allowMove) {
        document.getElementById('mpStatus').innerHTML =
          `<span style="color:#ff6a6a">⚠️ ${t('ruleMismatch')}</span>`;
        setTimeout(()=>showMpOverlay(false), 2000);
        return;
      }
      listenToRoom(roomId, claimedOppData.elo, claimedOppData.name);
      return;
    }

    // We are the host (X) — our own entry is in the final queue
    myPlayer='X'; roomId=myRoomId;
    searchingRef = queueRef.child(myId);
    const initState = serializeState();
    initState.status = 'waiting';
    initState.hostName = myName; initState.hostElo = myElo; initState.hostDeviceId = deviceId;
    initState.allowMove = allowMove;
    await db.ref(`${ROOMS_PATH}/${myRoomId}`).set(initState);
    oppName = ''; oppElo = 1000; currentOpponentId = null; rematchCount = 1;
    listenToRoom(myRoomId, null, null);

    // After 5 seconds, if still waiting, widen search to accept ANY opponent
    mmTimer = setTimeout(async () => {
      if (!roomRef) return; // already matched/left
      let widenOppId = null, widenOppData = null;
      const tx2 = await queueRef.transaction(current => {
        widenOppId = null; widenOppData = null;
        const entries = Object.entries(current || {}).filter(([id]) => id !== myId);
        if (entries.length > 0) {
          entries.sort((a,b) => Math.abs(a[1].elo-myElo) - Math.abs(b[1].elo-myElo));
          const [oppId, oppData] = entries[0];
          widenOppId = oppId; widenOppData = oppData;
          const updated = { ...(current || {}) };
          delete updated[oppId];
          delete updated[myId];
          return updated;
        }
        return current;
      });
      if (tx2.committed && widenOppId && widenOppData) {
        await db.ref(`${ROOMS_PATH}/${roomId}`).remove();
        if (roomListener && roomRef) { roomRef.off('value', roomListener); roomListener=null; }
        myPlayer='O'; roomId=widenOppData.roomId;
        currentOpponentId = widenOppData.deviceId || widenOppId;
        listenToRoom(widenOppData.roomId, widenOppData.elo, widenOppData.name);
      }
    }, 5000);
  } catch(e) {
    console.error('Matchmaking error:', e);
    document.getElementById('mpStatus').innerHTML=`<span style="color:#ff6a6a">⚠️ ${e.message}</span>`;
  }
}

function serializeState() {
  return {
    board: board.map(stack => stack.map(p=>({player:p.player,size:p.size}))),
    reserve: JSON.parse(JSON.stringify(reserve)),
    current, firstPlayer, allowMove,
    status: 'playing',
    hostName: myPlayer==='X' ? myName : (oppName||''),
    hostElo:  myPlayer==='X' ? myElo  : (oppElo||1000),
    guestName: myPlayer==='O' ? myName : (oppName||''),
    guestElo:  myPlayer==='O' ? myElo  : (oppElo||1000)
  };
}
function deserializeState(data) {
  board = data.board.map(stack => stack.map(p=>({player:p.player,size:p.size})));
  reserve = data.reserve;
  current = data.current;
  firstPlayer = data.firstPlayer;
  allowMove = data.allowMove ?? true;
  gameOver = false; selected = null;
}

let oppElo = 1000, oppName = '';

function listenToRoom(rId, knownOppElo, knownOppName) {
  if (roomListener && roomRef) { roomRef.off('value', roomListener); roomListener=null; }
  roomRef = db.ref(`${ROOMS_PATH}/${rId}`);
  if (knownOppElo!=null) oppElo = knownOppElo;
  if (knownOppName) oppName = knownOppName;

  roomRef.child('disconnected').onDisconnect().set(myPlayer);

  roomListener = roomRef.on('value', snap => {
    const data = snap.val();
    if (!data) return;

    if (data.disconnected && data.disconnected !== myPlayer) {
      if (!gameOver) {
        gameOver=true; scores[myPlayer]++;
        document.getElementById('status').innerHTML=`<span class="hx">🏆</span> ${t('opponentLeft')}`;
        playWin(); renderScores();
        applyEloResult(1); // opponent left = win
      }
      hideMpOverlay(); return;
    }

    if (data.surrendered && data.surrendered !== myPlayer) {
      if (!gameOver) {
        gameOver=true; scores[myPlayer]++;
        document.getElementById('status').innerHTML=`<span class="hx">🏳️🏆</span> ${t('opponentSurrendered')}`;
        playWin(); renderScores();
        applyEloResult(1);
        setTimeout(leaveRoom, 3000);
      }
      hideMpOverlay(); return;
    }

    if (data.status === 'waiting') {
      document.getElementById('mpStatus').innerHTML=`<div class="spinner"></div>${t('mpWaiting')}`;
      if (myPlayer==='X') { oppElo = oppElo || 1000; }
      return;
    }

    if (data.status === 'playing' || data.status === 'done') {
      hideMpOverlay();
      // Capture opponent identity reliably from room data
      if (myPlayer === 'X') {
        if (data.guestElo != null) oppElo = data.guestElo;
        if (data.guestName) oppName = data.guestName;
        if (data.guestDeviceId) currentOpponentId = data.guestDeviceId;
      } else {
        if (data.hostElo != null) oppElo = data.hostElo;
        if (data.hostName) oppName = data.hostName;
        if (data.hostDeviceId) currentOpponentId = data.hostDeviceId;
      }
      updateScoreboardNames();

      // If a fresh rematch round just started (status playing, no lastMove yet,
      // gameOver was previously true), reset the end-of-game UI back to "in progress"
      if (data.status === 'playing' && !data.lastMove && gameOver) {
        gameOver = false;
        document.getElementById('rematchRow').style.display='none';
        document.getElementById('surrenderBtn').style.display='block';
        if (myPlayer === 'O') rematchCount++;
      }

      const prevLastMove = data.lastMove;
      deserializeState(data);
      renderAll();
      if (prevLastMove && prevLastMove.player !== myPlayer) {
        playPlace(prevLastMove.size);
        const win = checkWinLine();
        if (win) {
          gameOver=true;
          scores[prevLastMove.player]++;
          win.forEach(idx=>document.querySelector(`[data-i="${idx}"]`).classList.add(
            prevLastMove.player==='X'?'win-x':'win-o'));
          const color=prevLastMove.player==='X'?'#7c6aff':'#ff6a6a';
          const sym=prevLastMove.player==='X'?'✕':'○';
          document.getElementById('status').innerHTML=
            `<span style="color:${color};font-weight:bold">${sym} ${t('opponent')}</span>${t('wins')}`;
          playLose(); renderBoard(); renderScores();
          applyEloResult(0);
          showGameEndUI();
        }
      }
    }
  });

  if (myPlayer === 'O') {
    // IMPORTANT: only announce our identity — never overwrite the host's
    // board/current/firstPlayer, since that state was already correctly
    // initialized by the host (X) when the room was created.
    roomRef.update({
      status:'playing',
      guestName: myName,
      guestElo: myElo,
      guestDeviceId: deviceId
    });
    hideMpOverlay();
  }
}

function applyEloResult(score) {
  // score: 1 win, 0.5 draw, 0 loss
  const delta = eloDelta(myElo, oppElo || 1000, score);
  saveMyElo(myElo + delta);
}

function pushOnlineMove(move) {
  if (!roomRef) return;
  const sz = move.size;
  if (move.source==='reserve') reserve[move.player][move.size]--;
  else board[move.boardIdx].pop();
  board[move.target].push({player:move.player,size:move.size});
  selected=null;
  playPlace(sz);

  const win = checkWinLine();
  current = win ? current : (current==='X'?'O':'X');
  const state = {
    board: board.map(stack => stack.map(p=>({player:p.player,size:p.size}))),
    reserve: JSON.parse(JSON.stringify(reserve)),
    current, firstPlayer, allowMove,
    status: 'playing',
    lastMove: {source:move.source,size:move.size,target:move.target,
      boardIdx:move.boardIdx??null,player:move.player}
  };

  if (win) {
    gameOver=true; scores[move.player]++;
    state.status='done';
    win.forEach(idx=>document.querySelector(`[data-i="${idx}"]`).classList.add(
      move.player==='X'?'win-x':'win-o'));
    const color=move.player==='X'?'#7c6aff':'#ff6a6a';
    const sym=move.player==='X'?'✕':'○';
    document.getElementById('status').innerHTML=
      `<span style="color:${color};font-weight:bold">${sym} ${t('you')}</span>${t('wins')}`;
    playWin(); renderScores();
    applyEloResult(move.player===myPlayer ? 1 : 0);
    roomRef.update(state);
    showGameEndUI();
    return;
  }
  roomRef.update(state);
  renderAll();
}

function leaveRoom() {
  if (mmTimer) { clearTimeout(mmTimer); mmTimer=null; }
  if (roomListener && roomRef) { roomRef.off('value', roomListener); roomListener=null; }
  if (roomRef) { roomRef.remove(); roomRef=null; }
  if (searchingRef) { searchingRef.remove(); searchingRef=null; }
  vsOnline=false; myPlayer=null; roomId=null;
  currentOpponentId=null; rematchCount=0;
  document.getElementById('btn-2p').classList.add('active');
  document.getElementById('btn-online').classList.remove('active');
  document.getElementById('surrenderBtn').style.display='none';
  document.getElementById('resetBtn').style.display='block';
  document.getElementById('rematchRow').style.display='none';
  resetScores(); firstPlayer='X'; initGame(); applyLang();
}

// ── Game end UI (online): offer rematch instead of auto-leaving ────────────────
function showGameEndUI() {
  document.getElementById('surrenderBtn').style.display='none';
  document.getElementById('resetBtn').style.display='block';
  const row = document.getElementById('rematchRow');
  const rematchBtn = document.getElementById('rematchBtn');
  if (rematchCount >= MAX_REMATCHES) {
    rematchBtn.style.display = 'none';
  } else {
    rematchBtn.style.display = 'inline-block';
    rematchBtn.textContent = `${t('rematch')} (${rematchCount}/${MAX_REMATCHES})`;
  }
  row.style.display = 'flex';
}

function startRematch() {
  if (!roomRef || rematchCount >= MAX_REMATCHES) return;
  rematchCount++;
  document.getElementById('rematchRow').style.display='none';
  document.getElementById('surrenderBtn').style.display='block';

  // Host (X) resets the shared board state; alternate who starts each rematch
  firstPlayer = firstPlayer === 'X' ? 'O' : 'X';
  board = Array.from({length:9},()=>[]);
  reserve = { X:{small:3,medium:3,large:2}, O:{small:3,medium:3,large:2} };
  current = firstPlayer;
  gameOver = false; selected = null;
  renderAll();

  if (myPlayer === 'X') {
    roomRef.update({
      status: 'playing',
      board: board.map(stack => stack.map(p=>({player:p.player,size:p.size}))),
      reserve: JSON.parse(JSON.stringify(reserve)),
      current, firstPlayer, allowMove,
      lastMove: null
    });
  }
}

document.getElementById('rematchBtn').addEventListener('click', startRematch);

// ── Board clicks ──────────────────────────────────────────────────────────────
document.getElementById('board').addEventListener('click', e=>{
  if(gameOver) return;
  if(vsAI&&current==='O') return;
  if(vsOnline&&current!==myPlayer) return;
  const cell=e.target.closest('.cell'); if(!cell) return;
  const idx=+cell.dataset.i;
  if(selected){
    if(canPlace(idx)){ placeOnCell(idx); }
    else{
      const stack=board[idx];
      if(allowMove&&stack.length&&stack[stack.length-1].player===current&&
         (!vsOnline||stack[stack.length-1].player===myPlayer)){
        selectBoardPiece(idx);
      } else { selected=null; renderAll(); }
    }
  } else { selectBoardPiece(idx); }
});

async function openLeaderboard() {
  document.getElementById('leaderboardOverlay').classList.add('show');
  const listEl = document.getElementById('leaderboardList');
  listEl.innerHTML = `<div class="spinner" style="margin:20px auto;"></div>`;
  if (!initFirebase()) {
    listEl.innerHTML = `<p style="color:#ff6a6a;text-align:center;">⚠️ Firebase nicht verfügbar.</p>`;
    return;
  }
  try {
    const snap = await db.ref(PLAYERS_PATH).get();
    const data = snap.val() || {};
    const players = Object.entries(data)
      .map(([id, p]) => ({ id, name: p.name || '?', elo: Math.round(p.elo || 1000) }))
      .sort((a,b) => b.elo - a.elo);

    if (!players.length) {
      listEl.innerHTML = `<p style="color:#888;text-align:center;">${t('leaderboardEmpty')}</p>`;
      return;
    }
    listEl.innerHTML = players.map((p, i) => `
      <div class="lb-row ${p.id===deviceId?'me':''}">
        <span class="lb-rank">#${i+1}</span>
        <span class="lb-name">${escapeHtml(p.name)}</span>
        <span class="lb-elo">${p.elo}</span>
      </div>`).join('');
  } catch(e) {
    listEl.innerHTML = `<p style="color:#ff6a6a;text-align:center;">⚠️ ${e.message}</p>`;
  }
}
function escapeHtml(str) {
  const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
}
